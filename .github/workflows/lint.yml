# =============================================================================
# CI — Lint & Format (Ruff)
# =============================================================================
# Runs Ruff linter and formatter on every push/PR to ensure code quality.

name: "CI: Lint & Format"

on:
  push:
    branches: [main, dev]
    paths: ["**/*.py"]
  pull_request:
    branches: [main]
    paths: ["**/*.py"]

permissions:
  contents: read

jobs:
  lint:
    name: Ruff Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Linter
        run: ruff check . --output-format=github

      - name: Run Ruff Formatter Check
        run: ruff format --check --diff .
