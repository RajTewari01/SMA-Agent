# =============================================================================
# CI — Type Check (MyPy)
# =============================================================================
# Static type analysis to catch type errors before runtime.

name: "CI: Type Check"

on:
  push:
    branches: [main, dev]
    paths: ["**/*.py"]
  pull_request:
    branches: [main]
    paths: ["**/*.py"]

permissions:
  contents: read

jobs:
  typecheck:
    name: MyPy Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install mypy python-dotenv
          pip install -e ".[core]"

      - name: Run MyPy
        run: |
          mypy apps/ config/ core/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --python-version 3.12
