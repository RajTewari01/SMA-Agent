# =============================================================================
# CI — Build Validation
# =============================================================================
# Ensures the package can be installed and imported without errors.

name: "CI: Build Validation"

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "apps/**"
      - "config/**"
      - "core/**"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Import Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[core,networking]"

      - name: Verify core imports
        run: |
          python -c "
          from config import config
          print(f'✅ Config loaded: {type(config).__name__}')

          from apps.resource_downloader.pipelines.register import (
              PIPELINE_REGISTRY,
              get_pipeline_by_keywords,
              get_all_pipelines,
              discover_pipeline,
          )
          print('✅ Registry module imported')

          discover_pipeline()
          names = list(PIPELINE_REGISTRY.keys())
          print(f'✅ Discovered {len(names)} pipelines: {names}')

          from apps.resource_downloader.pipelines.pipeline_types import ConfigPipeline
          print('✅ ConfigPipeline imported')
          "

      - name: Build sdist & wheel
        run: |
          pip install build
          python -m build
          echo "✅ Package built successfully"
