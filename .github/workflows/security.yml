# =============================================================================
# CI — Security Audit
# =============================================================================
# Scans for known vulnerabilities in dependencies and secrets leaked in code.

name: "CI: Security Audit"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Generate requirements from pyproject.toml
        run: |
          pip install tomli
          python -c "
          import tomli
          with open('pyproject.toml', 'rb') as f:
              data = tomli.load(f)
          deps = data.get('project', {}).get('dependencies', [])
          optional = data.get('project', {}).get('optional-dependencies', {})
          for group, pkgs in optional.items():
              if group == 'all':
                  continue
              deps.extend(pkgs)
          with open('_audit_requirements.txt', 'w') as f:
              f.write('\n'.join(deps))
          print(f'Generated {len(deps)} dependencies for audit')
          "

      - name: Install dependencies
        run: pip install -r _audit_requirements.txt

      - name: Run pip-audit
        run: pip-audit --strict --desc -r _audit_requirements.txt

  secret-scan:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
