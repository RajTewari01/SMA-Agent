# =============================================================================
# CI — Dependency Review
# =============================================================================
# Checks new dependencies introduced in PRs for license compatibility,
# known vulnerabilities, and overall health.

name: "CI: Dependency Review"

on:
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "requirements/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review New Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

  license-check:
    name: License Compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-licenses
        run: |
          pip install pip-licenses
          pip install -e ".[core,networking]"

      - name: Check dependency licenses
        run: |
          echo "=== Dependency License Report ==="
          pip-licenses --format=table --with-urls
          echo ""
          echo "=== Checking for copyleft licenses ==="
          COPYLEFT=$(pip-licenses --format=csv | grep -iE "GPL|AGPL|LGPL" || true)
          if [ -n "$COPYLEFT" ]; then
            echo "::warning::Copyleft-licensed dependencies found:"
            echo "$COPYLEFT"
          else
            echo "✅ No copyleft-licensed dependencies"
          fi
